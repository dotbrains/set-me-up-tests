name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  default-scenario:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: |
          shellcheck scripts/run-scenario.sh
          shellcheck scripts/in-container-run.sh
          shellcheck scripts/lib/assertions.sh

      - name: Run default scenario
        run: ./scripts/run-scenario.sh default

  dotfiles-scenario:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [default-scenario]
    steps:
      - uses: actions/checkout@v4

      - name: Run dotfiles scenario
        run: ./scripts/run-scenario.sh dotfiles

  dotfiles-macos:
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [default-scenario]
    steps:
      - uses: actions/checkout@v4

      - name: Run dotfiles scenario (native macOS)
        run: ./scripts/run-scenario.sh --native dotfiles-macos
